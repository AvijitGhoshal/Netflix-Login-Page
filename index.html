<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        h1 {
            padding: 10px;
            color: white;
        }

        input {
            font-size: 20px;
            color: white;
            display: block;
            width: 300px;
            height: 50px;
            border-radius: 10px;
            background-color: rgb(37, 34, 34, 0.3);
        }

        input:hover {
            background-color: rgb(183, 212, 203, 0.4);
        }

        button {
            width: 150px;
            height: 50px;
            background-color: brown;
            color: rgb(233, 227, 227);
            border-radius: 10px;
            font-size: larger;
        }

        button:hover {
            background-color: rgb(76, 150, 76);
            transform: translateY(-10px) scale(0.9);

        }

        ::placeholder {
            font-size: 20px;
            padding-left: 30px;
        }

        body {
            background: linear-gradient(to right, darkred, black);
        }

        form {
            padding-bottom: 30px;
        }

        .main {
            border-radius: 50px;
            width: 30%;
            padding-left: 100px;
            margin-left: 50%;
            margin-top: 200px;
            font-size: x-large;
        }

        .box {
            width: 600px;
            height: 600px;
            margin-left: 100px;
            margin-top: -550px;
            background-color: aqua;
            border-radius: 50px;
            margin-bottom: 100px;
        }

        .box img {
            width: 100%;
            height: 100%;
            border-radius: 50px;

        }
    </style>
</head>

<body>
    <div class="main">
        <div>
            <h1>Login Here</h1>
            <form onsubmit="return loginCheck()">
                <input type="text" id="name" placeholder="Enter Name">
                <br><br>
                <input type="tel" id="number" placeholder="Enter Number">
                <br><br>
                <input type="email" id="email" placeholder="Email Id">
                <br>
                <button type="submit">Login</button>
                <br><br>
            </form>
        </div>
    </div>
    <div class="box">
        <img src="https://cdn.siasat.com/wp-content/uploads/2022/12/Netflix.jpg" alt="">
    </div>

    

    <script>

        function loginCheck() {

            let name = document.getElementById("name").value;
            let number = document.getElementById("number").value;
            let email = document.getElementById("email").value;

            if (name === "" || number === "" || email === "") {
                alert("Please fill all fields");
                return false;
            }

            if (number.length < 10) {
                alert("Enter valid phone number");
                return false;
            }

            alert("Login Successful Welcome " + name);

            return true;

        }

    </script>
</body>

</html>
